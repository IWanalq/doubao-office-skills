<article class="{{classes}}" data-q="{{query}}" data-source-level="{{source_level}}" data-source-key="{{source_key}}" data-category="{{category}}" data-importance="{{importance}}" onmouseenter="_highlightSource(this.getAttribute('data-source-key'))" onmouseleave="_highlightSource('')" aria-label="第{{rank}}条"><div class="news-body"><h3><span class="rank">{{rank}}</span><span>{{headline}}{{citation}}{{new_badge}}</span></h3><p class="news-summary">{{summary}}</p>{{source_meta}}</div></article>
